    <!-- Theme initialization - MUST run before any rendering -->
    <script>
      (function() {
        // Clear ALL old theme keys from previous implementations
        try {
          localStorage.removeItem('theme');
          localStorage.removeItem('theme_initialized');
          localStorage.removeItem('theme_migration_v1');
          localStorage.removeItem('theme_migration_v2');
          localStorage.removeItem('theme_reset_v3');
        } catch(e) {}
        // Only apply dark if user explicitly chose it
        var c = localStorage.getItem('theme_user_choice');
        if (c === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
