version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intraday-staging
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: staging
      DATABASE_URL: mysql://staging_user:staging_password@db:3306/intraday_staging
      REDIS_URL: redis://redis:6379
      JWT_SECRET: staging_jwt_secret_key_change_in_production
      LOG_LEVEL: debug
      MONITORING_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: mysql:8.0
    container_name: intraday-staging-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: intraday_staging
      MYSQL_USER: staging_user
      MYSQL_PASSWORD: staging_password
    volumes:
      - staging_db_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: intraday-staging-redis
    ports:
      - "6379:6379"
    volumes:
      - staging_redis_data:/data
    networks:
      - staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  prometheus:
    image: prom/prometheus:latest
    container_name: intraday-staging-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - staging_prometheus_data:/prometheus
    networks:
      - staging
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'

  grafana:
    image: grafana/grafana:latest
    container_name: intraday-staging-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - staging_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - staging
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: intraday-staging-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - staging_alertmanager_data:/alertmanager
    networks:
      - staging
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

volumes:
  staging_db_data:
  staging_redis_data:
  staging_prometheus_data:
  staging_grafana_data:
  staging_alertmanager_data:

networks:
  staging:
    driver: bridge
